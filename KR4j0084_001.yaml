body:
  text: 西河詞話卷一翰林院檢討毛竒齡撰山隂吕弦績作品花詞取題之有花名者譜之如早梅芳詠梅蕙蘭芳引詠蕙蘭月照梨花詠梨小桃紅詠桃杏花天詠杏碧牡丹詠牡丹海棠春詠海棠新荷葉詠荷瓜茉莉詠茉莉桂枝香詠桂金菊對芙蓉詠菊詠芙蓉朩蘭花慢詠朩蘭碧桃春詠碧桃類亦一新體然唐詞用本題作賦原是此意至後始題事兩不合耳宋孫眀復鬢白李文定請以弟之女妻之孫曰相女不以嫁公侯乃以嫁山谷衰老古無有之其曰相女者相門之女正以李復古曽為相故也西廂末劇有自古相女配夫世多不解烏知實本諸此崇禎甲寅京師梨園有南遷者自訴能絃舊詞試其技促彈而曼吟極類搊筝家法然調不類筝坐客授蔣竹山長調令絃輒辭曰口俚礙吟嘆何也時徐仲山貽九日倡和詞至誦而授之歌裁數過指爪融暢詢其故云吾所傳者無調而有詞無宮徴而有音聲詞雅則音諧音諧則絃調由是推之世之效辛蔣者可返巳菊莊者吳江徐子電發也建平吳博士送豫之江寧有念奴嬌詞嘗藏之袖間暨十年後重過其廬出詞讀之則字已漫滅不可認矣其詞曰五更初起裝成未把酒送君燈下揮手出門正月落滿屋光流如瀉此去江南他時江北回首無多話驅車行矣可憐獨步歸舍試看繞地荆榛君今卜何處能超罟擭元節望門去路逺天下朱家皆假田舍粗安壺漿堪掩意氣長相藉天涯何限一時去此秋夜其詞甚悲愴有梗概博士真愛我豫向在蔡州席上誦此詞爭傳寫去息縣夏少府有雪中送豫念奴嬌詞亦用此韻王師徇下滇南時有李安西孫安南二人皆憲賊假子孫最跋扈順治辛卯師將逾嶺李急守髙涼孫獨不行遣人要封爵始發兵時巳議加二字大怒對使罵曰既為王何吝一字謂吾不能自加耶使者往復甚恐凡四易命必欲得秦王為請衆皆相視惟主政者嚴君起恆流涕爭曰誠欲自加則吾不敢聞若猶不然則祖制不可更主國不可挾名器不可紊獨吾項可斷耳于是中沮後君視師南梧泊舟大黃江忽傳安南鎮至君迎之入舟安南統纒頭兵數千列幟兩岸語訖起坐君送之至馬門將登岸安南握君手笑曰吾不斷君項但潄君腹何如揮健兒撲君墮水兩岸列者譁而前移時乃定然巳莫敢誰何距浹旬梁家渡口見虎來踰水而出負一冠帶尸登岸徐行居民見者譟隨之虎不少動但從容相髙阜卸所負四顧周遭既定復繞之兩匝號而去居民逺近競來觀逮暮有伍君定者後至驚認之曰此相國嚴君也君右目不瞑顙前網裂數寸而顙不少損于是居民爭易衣殮之瘞虎負所名曰虎冢計大黃江至此逆流而上巳百二十里矣時伍君定製一詞名法駕導引使居民歌之詞曰梁家渡梁家渡野虎負來人海畔一隅誰是主天南萬里未招魂此處且安身後安南竟封秦王歸命而安西戰死起恆字秋野由進士起家山隂人西廂久為人更竄豫求其原本正之逐字核實其書頗行苐中尚有不能詳處如苐四折內有和尚們回施些幽期密約句豫向所釋但曰施僧曰布施反乞僧施曰回施以為本文巳眀不必更有引釋耳後友人有論及者堅謂回作曲解是委曲周旋意雜引回曲二字作證曽記北史北齊李庶無鬚人謂天閹崔諶嘗戲庶曰教弟種鬚法取錐刺靣為竅而插以馬尾當效是時崔族多惡疾庶因答曰請先以方回施貴族藝眉有效然後種鬚蓋惡疾是癩疾以癩者無眉故云也然則回施反施矣蔡子伯曰施音賜今俗稱回賜者即回施之謂尤較直捷但釋古須有據耳馬州當壚者馮二名絃夜聞豫歌倩豫同行者導意豫辭之曰吾不幸遭厄吹篪渡江彼傭不知音豈誤以我為少年逰耶次日遂行後十年見名媛詞緯中有馮氏江城子二闋是讀豫新詞所作其詞曰緑隂何處曉啼鶯弄新聲最關情一夜寒花吹落滿江城讀得斷碑黃絹字人已渡暮潮橫又曰蘭陵江上晚花飛冷煙微著人衣無數新詞最恨是桃枝待得蘭陵新酒熟桃葉好送君遲誦之亦殊自悽惋聞其詞倩桐鄉鍾王子代作者然又有武陵春春晚虞美人賦得落紅滿地二詞亦甚佳想皆不出其手然其意則有不可巳者前人所傳子夜莫愁諸詞想皆似此也邑某聘某氏女將就婚有強委禽者明府姚公斷還之令交拜于訟庭其斷詞駢麗傳誦人口既而訟者爭不徹觀察下府讞府使君何公復斷還之一時傳為盛事時豫在何使君坐使君命豫製鵲橋仙詞詞云東床先訂西家願宿何事穿墉穿瓦縱教強委後來禽却不道子南夫也明府風流使君瀟灑兩斷可妻公冶莫言河漢鵲橋乖看合浦在訟庭之下詞本無韻故宋人不製韻任意取押雖與詩韻相通不逺然要是無限度者豫友沈子去矜創為詞韻而家稚黃取刻之雖有功于詞甚眀然反失古意假如三十韻中惟尤是獨用若東冬江陽魚虞皆灰支微齊寒刪先蕭肴豪覃鹽咸則皆是通用此雖不知詞者亦曉之何也獨用之外無嫌韻通韻之外更無犯韻則雖不分為獨為通而其為獨為通者自了也然嘗記舊詞尚有無名氏魚遊春水一詞秦樓東風裏輕拂黃金縷通紙于語張仲宗之漁家傲短夢今宵逺到否荒村四望知何處通語于有者若以平上去三聲通轉例之則支通于魚魚通于尤必以支紙一韻魚語一韻限之未為無漏也至若真文元之相通而不通于庚青蒸庚青蒸之相通而不通于侵此在詩韻則然若詞則無不通者他不具論祗據阮郎歸一調有洪叔嶼王山樵二作中云晴光開五雲扶春來遠林相呼試看燈何曽一字真今朝第幾程則已該真文元庚青蒸侵有之其在上去則祗據朱希真詞人情薄似秋雲不須計較苦勞心萬事元來有命更逢一朵花新片時歡笑且相親眀日隂晴未定其無不通轉可知而謂真軫一韻庚梗一韻侵寢一韻是各自為説也其他歌之與麻未必不通寒之與鹽未必不轉但為發端尚俟踵事至如入韻則信口揣合方音俚響皆許入押而限以屋沃一韻覺藥一韻質陌錫職緝一韻物月曷黠屑葉一韻合洽一韻凡五韻則試以舊詞考之張安國滿江紅詞有髙丘喬朩望京華迷南北句則通屋于職晏叔原春情有飛絮繞香閣意淺愁難答韻險還慵押月在庭花舊園角則又通覺與藥與合與洽孫光憲謁金門有云留不得留得也應無益揚州初去日又云却羡彩鴛三十六孤鸞只一隻則又通質陌錫職于屋若蘇長公赤壁懷古是念奴嬌調其云千古風流人物人道是三國周郎赤壁捲作千堆雪雄姿俊發一樽還酹江月鮮于伯機亦有是調云雙劍千年初合放出羣龍頭角極目春潮濶年年多病如削張于湖是調有云更無一點風色著我扁舟一葉妙處難與君説穩泛滄浪空濶萬象為賔客不知今夕何夕則是既通物月與屑與錫又通覺藥與曷與合而又合通陌職與曷與屑與葉與緝是一入聲而一十七韻展轉雜通無有定紀至于髙賔王霜天曉角之通陌鍚職緝詹天遊霓裳中序第一之通月曷職葉王昭儀滿江紅之通月屑鍚職皆屬尋常可無論巳且夫否之音俯向僅見之陳琳賦中凡廣韻切韻集韻諸書俱無此音若北之音卜則不特從來韻書無是讀押即從來字書亦並無是轉切此吳越間鄉音誤呼而竟以入韻此何謂也且昔有稱閩人林外題垂虹橋詞不知誰氏後流傳入宫禁孝宗讀之笑曰鎖與老押則鎖當讀掃此閩音也及訪之果然向使宋有定韻則此詞不宜流傳人間而孝宗以同文之主韻例不遵亦安得反為曲釋且未聞韻書無此押字書無此音自上古迄今偶一見之鄉音之林外而公然讀押嬗為故事則是詞韻之了無依據而不足推求亦可驗已况詞盛於宋盛時不作則毋論今不必作萬一作之而與古未同則揣度之胸多所兀臬從之者不安而刺之者有間亦何必然至若北曲有韻南曲無韻皆以意出入而近亦遂以北曲之例限之至好為臆撰如西樓記者公然以中原音韻明注曲下且引曲至尾皆限一韻而附和之徒反以古曲之出入為謬而引曲過曲前腔尾聲之换韻反謂非體何今人之好自用而不好按古一至是也白樂天花非花詩唐人醉公子詞長孫無忌新曲楊太真阿那曲自是詞格他若回鶻石州阿嚲回回波樂烏鹽角鷃濫堆水調歌頭諸名俱是樂府然其語有近詞者則亦可以詞名之如隋帝望江南徐陵長相思初亦何嘗是詞而句調可填即為填詞由是推之則梁武江南弄諸樂以及鮑照梅花落陶𢎞景寒夜怨徐勉迎客送客王筠楚妃吟梁簡文春情隋煬夜飲朝眠曲皆謂之古詞何不可哉崑山顧宗伯錫疇有江神子詞此宗伯死後降乩作也宗伯不得死所相傳在溫州時尚思賣犢與永嘉令鄉人吳君夜飲江心寺酒後慷慨既别其同行管兵者賀均堯以宿憾縛沈之江人不知也踰年公忽降乩於華亭令張調鼎許乃作此詞中略道大意後以人纍問竟詳言之始析其事或云公已先見夢居民得掩其骸於某港傍矣今詞句所傳有互異處不敢妄正豫四十以前目力尚強獨瞑後稍晦若雞眚然嘗隨老母遊天竺歸夜次湖寺寺壁書和韓蘄王詞母令誦聽豫略視間誤以為蘄王詞也信口誦所記蘄王本詞一過實於壁間字豪芒不見蓋不敢自居老眼故然耳次日母視壁大怒曰本和蘄王詞而故誦本詞以謾我不亦異乎王師下浙時錢唐王繼朋奉母避兵露宿於鳯凰山南忽纓槍絡馬擁十許婦至詢之則方馬軍相失者是時潰軍南竄東渡者半而半不得渡倉皇間恐追及侻短後束槍投澗中殺馬而食少頃望城中火起各相向哭繼朋乃為詞和王昭儀滿江紅調哀歌之次早散去軍主急推一病婢與繼朋曰昨聞君歌哀似非恆人吾欲以孱婢纍君之行言訖遽别後繼朋居富春婢病愈呼曰紅得以其從滿江紅一詞得之故也既而婢復病嘔血而死母哭之繼朋曰紅得之而紅失之謂嘔血何哭之有慈溪葉天樂於秋節過常熟偕友倡和名三秋詩又為詞分三名一銀河詞用桞耆卿二郎神七夕韻一酹月詞用東坡念奴嬌赤壁懷古韻一采菊詞用辛稼軒賀新郎三山雨中韻各有所取也豫舊在真州度七夕頗有邂逅得詞十六首亦名銀河詞其稿失於章江捉船之兵後在汝寧七夕復為詞憶之曰記得年前小礬山下乾鵲夜來時然巳不可再矣天樂名吟其大父四明先生尊人此君先生俱有集行世苐厯世清節食亷吏貧天樂詞賦多為友人所刻此三詩三詞皆巳刻者共六卷乙巳夏豫欲登岱及濟寧而病客有挾少君之術於旅亭者能召美人帷中臨鏡易衣豫喜而賂其術甚弇鄙可笑然亦有小異者能擲果題詩如葉天樂銀河詞中有宴周中翰宅觀方士召美人隔帷賦詩是也苐其詩皆現成通行每每重見惟沈比部肻齋云曽於王司農宅觀此獨得贈詞末云吟成未許續金巵怕是沈郎病起瘦人時此是新作且詞亦甚佳頗屬怪事豫少不撿曾以度曲知名凡坊曲伎人爭相請教且嘗以已詞令唱故雲間徐西崖贈詞有云最消魂一曲新詞雪兒爭唱神仙句禾中談開子詞云想王孫歸路正生芳草舊人歌曲爭换梅花龍眠何令逺詞云酒肆歌鬟千秋樂府皆是實賦獨令逺寄詞又有云記芳洲公宴酒酣聽度曲别奏清商寫出雲樓雪榭景倍瀟湘又楊桞腰肢雪兒分韻櫻桃口頰樊素生香則以豫乙已冬杪曽於吉安白鷺洲公宴酒酣度曲且戲作芳洲公宴圖故又有雲樓句至其云楊桞櫻桃則似指豫所攜者今則都無此興矣計乙已冬杪至今寄詞時適遇丁已恰一十二年令遠為詞能不忘舊事如此詞名多取詩句之佳者如夏雲峰則取夏雲多奇峰句黃鶯兒則取打起黃鶯兒句是也獨酹江月大江東去則因東坡念奴嬌詞內有大江東去一樽還酹江月二句遂易是名夫以詞中句而反易詞名則詞亦偉矣今人不知詞動訿大江東去彼亦知其詞如是偉耶李于鱗以填詞法作樂府謂樂府有聲調倘語句稍異則於聲調便不合爾不知填詞原有語句平仄正同而聲調反異者如玉樓春與朩蘭花同而以大石調歌之則為朩蘭花類然則聲調何嘗在語句耶樂有調同而字句異者清調平調殊於楚歌有調異而字句同者豳雅豳風只一七月于鱗坐不解耳其説頗詳豫詩札卷臨安阿迷州土官普眀升在崇禎中屢叛不伏廣西府太守張繼孟初到任盛稱眀升有才略可屬大事本不宜摧抑太甚以致激變遂布檄逺近為之表暴舊凡檄過阿迷者眀升必邀窺之及窺是檄喜甚時新太守謁兵備臨安必道阿迷繼孟又聲言道阿迷時當過普公則益喜及臨過眀升方遣人伺候而繼孟故醉輿中不醒及醒詢之則巳踰界矣繼孟大怒立榜輿人訖乃倣徨曰不期有大事必不能待而普公又不可不見急鞴快馬從二人立還投刺眀升聞其至且聞其責輿從狀大喜過望遂踉蹌出見交拜畢即起辭去強挽以茶繼孟一手接甌一手以匙摝果云人言公善毒人信否眀升大驚曰如眀公者臣方欲剖心與食寧食以毒遂引手易甌立盡曰人言不足信有如此甌因大笑慰勞告别繼孟一别即狂奔臨安凡三易馬明升隨追之不及矣是日眀升暴死以繼孟摝匙時反入藥在內故也後眀升妻萬氏復統部衆思報仇然不可得會萬氏素與安南司土官沙源之子沙定洲年少相慕至是謀贅定洲而沙源不解其意欲遣長子定海就婚萬氏乃為鬮鬮得定洲遂贅焉時有南歌子詞曰貝帶邀紅定蠻絲結綵樓花裏暗藏鬮鴛鴦何處宿在沙洲後甲申之變萬氏與定洲并吞諸酋滅黔國即沐天波也將盡有雲南地至巳丑突為李定國戰敗執之夫婦並肆市中張采為儀部歸嫉其鄉太倉州豪猾肆橫民多受害白州守錢肅樂窮治之乙酉元旦夢鼓吹送乾坤正氣四大字到家詢其故曰以君方正能除惡也醒而不悅以為吾不能殉國而徒博區區以名正氣何以自問暨五月十三日南都驟破羣豪乘釁悉集小教場漢關侯祠聲言報怨捉采蜂擊之血胾狼藉巳而氣絶乃下祠門乾坤正氣板額舁還其家時采見神助且微聞關侯屢叱救之竟得不死次年羣豪皆受誅又次年五月十三日采過謁祠仰見乾坤正氣額歸而抑鬱因書紙曰在昔死無名此復生何益不道乾坤正氣人猶是偷生日越數日竟死姑蘇周五郎巷貨郎貨紙團扇者晨起有道士乞食過門貨郎丐書扇道士書數扇去其一菩薩蠻詞是集唐者詞曰玉樓眀月長相憶溫庭筠侍兒扶起嬌無力白樂天不語欲魂銷李珣雲鬟裊翠翹魏承班抱琴時弄月李白皓腕凝雙雪韋莊何處最相知牛嶠爇香私語時毛熙震觀者異之但不得道士所在或疑道士為女冠賦此觀詞中玉樓翠翹抱琴爇香俱類女冠可見或曰此非道士詞考花間集爇香本作竊香微不合後有人從吳淞歸云此詞係海上張也倩作也倩號梅禪道人有刻集其未刻集中載此詞未知是否雲間諸進士嗣郢董孝亷俞諸君曾於重陽後作神山之會即彭仙人棲神處也時婁東吳學士偉業在座連遣覓女郎倩扶必不得夜分滬上張𢎞軒刺史鍚懌來赴投刺後學士命以已車迎入使者傳覆需兩車人頗訝之及至則挾一衣冠少年光豔暗射若薄雲籠月人各却步且不敢詢姓氏及移燭燭之則倩扶也一座譁然蓋是時倩扶巳與𢎞軒定情久矣𢎞軒有意難忘初晤殢人嬌惜别鳯棲梧寄憶再晤諸詞流傳人間其序曰時維秋月節屆登髙思逸事於龍山遇佳人於鶴浦銜杯浹日判袂經旬兔簡頻濡鴻箋數寄堪笑粘泥之絮翻憐逐水之萍品其髙韻人更淡於黃花感此微詞意毋傷於緑葉後倩扶有寄𢎞軒主人詩其落句云不道離愁深似許輕教分手盼重過豫和詩云但遇龍山髙會後尚疑青雀夜來過正暗刺前事也端州有時製雕漆屏風功作精巧貴重一時然其概不過兩邊綵飾多鏤刻名人詩畫而已吳制府獨創作三摺屏每開一摺則兩摺隱於其中一摺垂簾觀劇一摺山水人物其左開一摺凡筆墨楮研書畫棋爐以及提壺酒盞陸博摴蒱之屬無不畢具如應用某物即開某格子探取而出外俱以隔扇掩之其欵式悉仿博古圖製一望燦然時豫郡諸名士如吕絃績宋岸舫吳伯憩金雪岫輩皆朝夕聚其處有一客新至怨公希見且未經治具作水調歌頭以謿之其詞曰與客每隔座不過一幃褰何用連環九疊八面費雕鐫不是湘山十二中有洞天福地一醉幾千年銀船并螺碗總貯石屏間公得詞大慙遽加禮謝過公諱興祚字伯成即當世稱留村先生者也西河詞話卷一
