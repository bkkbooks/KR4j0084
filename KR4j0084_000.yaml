body:
  text: 西河詞話詞曲類三詞話之屬提要臣等謹案西河詞話二卷國朝毛竒齡撰竒齡有仲氏易巳著録據西河合集序目稱是書四卷佚其二卷不敢􅎓補故僅以其半刋行竒齡填詞之功較深於詩且詞本為小技萌於唐而成於宋亦不能援引古書别為髙論故所說轉不支離其論沈去矜詞韻一條尤為精核論辛棄疾蔣捷為别調亦深明源委惟其逺溯六朝以鮑照梅花落亦可稱詞則漢代鐃歌何嘗不句有長短亦可以為詞之始乎又西廂記相女配夫本為相度之相今尚有此方言而引孫復相女不以嫁公侯乃以嫁山谷衰老語以為宰相之相則牽引附㑹仍蹈結習至所述詞曲變為演劇縷陳始末亦極賅悉而云宋末安定郡王趙令畤始作商調鼓子詞譜西廂傳竒考令畤即蘇軾集所稱趙德麟實非宋末之人亦未免少疏然自宋以來撰詩話多撰詞話者較少竒齡是編雖不及徐釚詞苑叢談之賅博而亦足備談資故削其詩話而録存是編焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f09d0ee2c1979a222436be6496e24e85de32289eb7c179096ec37f342341c000
