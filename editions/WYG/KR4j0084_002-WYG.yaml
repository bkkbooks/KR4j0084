body:
  text: 西河詞話巻二翰林院檢討毛奇齡撰梁尚書上元席上出窩絲糖供客其形如扁蛋光面有二埳若指掐者囓之粉碎散落皆成細絲座客無識者尚書云此崇禎末宫中所製今乆無此矣惟西山淨室有老宫人為比丘尼尚能製此糖每歲上元節必以銀花椀合子相餉真罕物也乃出巳所製糖多令詞命座客和之予和詞云𢷬盡筁頭泥春蠶巳蜕衣片􅄳裹作彈丸兒不破彌羅三寸繭誰觧道一窩絲粔籹漢宫遺餦餭乆未施開元宫女尚能為今日尚書花餤㑹銀椀合使人思羯皷與雞婁答臘桃皮諸皷同一名色則但一革面不過中邊二聲耳何縁得有髙下長短疾徐如絲竹之能宛轉者乃有與詞曲同名如蘓合香春光好五更轉萬嵗樂類且有最竒名色如菩薩縱利陀地婆㧞羅伽缺一字霜風百歳老夀大鉢樂府君王盛神武赫赫君之眀大勿大通蘓羅堂堂等凡一百二十餘曲更有太簇宫太簇商太簇角及食曲佛曲諸調不知何所分别且何所色記而有此三絃起於秦本三代鼗皷之製而改形易響謂之絃鞉故雖能倚歌曲折而仍以節刌輻轃其間唐時坐部多習之故世遂以為邊樂實非也若提琴則起於眀神廟間有雲間馮行人使周王府賜以樂器其一即是物也但當時攜歸不知所用其製用花梨為幹飾以象齒而龍其首有兩絃從龍口中出腹綴以􅉬皮如三絃然而較小其外則别有鬃絃絆曲朩有似張弓衆昧其名太倉樂師楊仲修能識古樂器一見曰此提琴也然按之少音於是易朩以竹易􅉬皮以匏而音生焉時崑山魏良甫善為新聲賞之甚遂攜之入洞庭奏一月不輟而提琴以傳然䆒不知為何代樂器仲修雖識古亦不能按所始也考唐宋舊樂器甚夥然移時即没此亦不過唐宋間所造而獨得盛行亦屬異事先教諭曰當時傳其事者多萬厯間詞客題咏大抵皆新水令起至清江引止共八十六曲名賞聲集至今清曲家能歌之京師老酒家有能造廊下内酒者每倍其值相傳眀代大内御酒房後牆有名長連者閱三十一門其前層短連閱三門共三十四門並在𤣥武門東名廊下家凡内宫答應長隨皆於此造酒射利其酒殷紅色類上海琥珀光者常熟馬丹谷從上海教諭内遷翰林院待詔嘗載上海酒飲客詐以為廊下内酒實琥珀光也予與同館汪舟次偶過飲舟次醉後贈以詞其後截云君今來上海玉盌盛猶在何必問紅泉長連共短連同館相傳為佳話云山隂金雪岫厭城市喧煩别築一竹屋蓋以茅四面皆種草花吴子伯憩屢過之至必劇飲且以女牆鮮遮掩必勸種芭蕉以環其屋遂書踏莎行詞於壁曰未訪桃源先成竹屋浣花溪畔何須卜隣家錯比子雲亭主人自號愚公谷書聚一㡘酒藏十斛相招長向藜牀宿勸君四面種芭蕉春風吹起隂隂緑後果種芭蕉數十本遂名芭蕉書屋張鶴門詞以草堂為歸其長調絶近周桞雖不絶辛蔣然亦不習辛蔣此正宗也大抵詞必有意有調有聲有色人人知之若别有氣味在聲色之外則人罕知者驟得張鶴門詞適在乆客初歸心思迷煩之際不辨其何意何調其聲何等其色何似而徘徊纒綿心縈意擾一若醉裏思鄉燭邊顧影使人轇轕不可觧在昔莊皇帝入宫宫人焚色目所貢鵲腦時方簡文書忽若醉夢間迷殢頓生憧憧然既而漸甚亟命撤其焚而擯其貢當是時未嘗有所見有所聞也鶴門詞猶是矣鶴門介他客以其詞五巻請予為叙予不能叙而姑應以此江西王于一宿妓于塔山之息柯亭禾中朱錫鬯曉過于一尚未起錫鬯隔幔坐待之于一不知也向妓誇生平貴介任俠且曰吾雖老猶將買汝置行帟矣鍚鬯咥然遂驚起慚責幾成大隟次日坐客有問予于一作何語者予誦張鶴門醉公子詞應之云佯醉許佳人千金贖汝身一座大噱徐仲山夫人係商太傳女善文與其女兄祁忠敏夫人俱以閨秀為越郡領袖苐質過脆弱星相家毎惜其不年有天台萬年寺尼僧謁夫人驚為妙色身如來化身但曼陀羅花恐非人間所宜有請手書法華經一部入萬年藏為夫人懴悔夫人乃手書三部計工三年約字十三萬有竒書成其一付萬年藏去餘二藏于家㑹雲門廣孝寺搆大殿成三目尊者請盡施之一供殿極甍間裹以繡函而石甃其外一藏於毘盧遮那世尊之腹被瓔珞寳珠以金繩懸之尊者復搥鼓集大衆宣揚其意且為偈曰惟此金經夀千載佛身色身總不壊乃未幾而香積失火巳及殿桷矣尊者命登殿極取經且将移毘盧世尊於三門忽焱風驟起於北火頓熄觀者異之當夫人書經時曽製菩薩鬘詞傳人間有云篆烟吹過花深處缺二字葉底垂甘露何處見如來青蓮筆下開朝朝研黛盌不畵春山逺但寫妙蓮華香風遍若耶禮部某郎中無子適其妾有身巳産女矣匄隣園尼僧向城東育嬰堂懷一血胎内之遂詐言生一男于彌月宴客座間各賦賀詞予同官陳迦陵賦桂枝香曲二闋其首闋前截云泛蒲未既蘭湯重試若非釋氏攜來定是宣尼抱至郎中疑迦陵知其事故誚之即次闋前截云懸弧邸第充閭佳氣試聽戸外啼聲可是人間恒器凡人間戸外皆類誚詞遂大恚恨其後凡禮部於翰林院衙門有所差擇必厚抑迦陵竟至淹滯始知文字之隙原有檢㸃所不及者然不可不慎也予赴京師路遇徐仲山忻然同行曽於良鄉北旅店見題壁詞迥出恒輩其詞曰灑盡窮途泪看少年一番行役一番顦顇雨雪霏霏泥滑滑上馬屢愁顛躓又况值金輪西逝屈指離家能幾日早行來巳是三千里嗟嵗月似流水䝉茸漸覺羊裘敝怎當他朔風凄𦂳裂膚墮指莽莽長途誰是主燈火前村近矣只無奈望門投止沽得濁醪聊破冷向燈前獨飲難成醉天未曉又催起特不署姓氏不知為何人作及到京錢塘俞季瑮投以詞名京師雜感共九章皆賀新郎調其首章即是詞也但牢愁盈紙仲山怫然曰甫來京而得是詞其能頃刻留此地耶後仲山應試失第不彀資斧每依其同姓官京師者仍不得歸去嘗過予飲曰予初賞季瑮詞今恍自道然予䆒薄季瑮去留快然何必爾爾耶予因詢之仲山舉其第六首前截曰撫劒悲歌罷望長天驚風飂戾横河傾瀉有客訪予予已醉且自坐君牀下有至語語君休訝餐菊紉蘭徒自潔看夷光未字無鹽嫁非詭遇賤工也第九首後截曰襟懐嶽嶽和誰語笑卞和楚庭泣玊徒多悲苦我有草堂東郭畔管樂何妨自許且抱膝長吟梁甫有志男兒非困頓彼掃門魏勃何須數不似意且歸去古歌舞不相合歌者不舞舞者不歌即舞曲中詞亦不必與舞者搬演照應自唐人作柘枝詞蓮花鏇歌則舞者所執與歌者所措詞稍稍相應然無事實也宋時有安定郡王趙令畤者始作商調鼔子詞譜西廂傳奇則純以事實譜詞曲間然猶無演白也至金章宗朝董觧元不知何人實作西廂搊彈詞則有白有曲專以一人搊彈并念唱之嗣後金作清樂仿遼時大樂之製有所謂連廂詞者則帶唱帶演以司唱一人琵琶一人笙一人笛一人列坐唱詞而復以男名末泥女名旦兒者并雜色人等入勾欄扮演隨唱詞作舉止如叅了菩薩則末泥祗揖只將花笑撚則旦兒撚花類北人至今謂之連廂曰打連廂唱連廂又曰連廂搬演大抵連四廂舞人而演其曲故云然猶舞者不唱唱者不舞與古人舞法無以異也至元人造曲則歌者舞者合作一人使勾欄舞者自司歌唱而第設笙笛琵琶以和其曲毎入塲以四折為度謂之雜劇其有連數雜劇而通譜一事或一劇或二劇或三四五劇名為院本西廂者合五劇而譜一事者也然其時司唱猶屬一人仿連廂之法不能遽變往先司馬從寜庶人處得連廂詞例謂司唱一人代勾欄舞人執唱其曰代唱即巳逗勾欄舞人自唱之意但唱者祗二人末泥主男唱旦兒主女唱他若雜色入塲苐有白無唱謂之賔白賔與主對以說白在賔而唱者自有主也至元末眀初改北曲為南曲則雜色人皆唱不分賔主矣少時觀西廂記見每一劇末必有絡絲娘煞尾一曲于扮演人下塲後復唱且復念正名四句此是誰唱誰念至末劇扮演人唱清江引曲齊下塲後復有隨煞一曲正名四句總目四句俱不能觧唱者念者之人及得連廂詞例則司唱者在坐間不在塲上故雖變雜劇猶存坐間代唱之意此種移蹤換跡以漸轉變雖詞曲小數然亦考古家所當識者故先教諭曰世人不讀書雖念詞曲亦不可况其他也康熙巳未上元夜予尚依内閣學士李夫子宅夫子方出閣招予至東華門舊𢎞文院夜飯觀燈歸第夫子當夕製上元觀燈曲予依韻和之次日舍人汪蛟門録予詞詣梁尚書請觀值尚書作勝㑹設席於猪市對門王光禄宅有内務府供奉太倉王生無錫陸生陳生攜笙笛在座其時薦舉來京者惟施愚山大叅陳其年髙阮懐兩文學赴召請到門尚書立命具小輿招予酒再廵二生遞歌王生把笛演舊清曲畢尚書命二生歌予詞使王生以笛倚之倜儻嘹喨一坐皆竦聽尚書大悦因問笙笛必有譜此無譜而能倚曲何耶王生曰善歌者以曲為主歌出而譜隨以成不善歌而斆歌者欲竊其歌聲則以譜為主譜立而曲因以定尚書曰有是耶然則今所歌者其歌聲已歇矣君尚能依其聲立一譜乎曰何不可次日王生就昨所歌者竟定一笛色譜尚書命他僮就笛按聲與昨歌無異因嘆息謝去尚書者真定相公梁夫子也時為司農有年矣後予臨入館執摯門下特是詞倉卒凑趂極不愜意不知夫子何以見賞如此益信李白清平調詞白樂天桂華曲原不必佳也今録其曲并笛色譜於後錦纒道剛五則五是五伬仕五五一翦尺工六青五幡五六長工五仕安五六工六早尺上工六春五一又五仕恰六五遇五仕上丶五仕五六五元尺工上尺辰上尺工尺上尺上四一望工五六工天尺工尺街尺工尺尺清五仕光五六工尺一工六五六道工五六工尺一如尺工五工工尺銀上只工見六那工銜尺工六珠工鳯五伬仕五戴伬仕伬山五仕鼇六五六蓮丶工五仕花五㐅六工工繞尺上工六身五一又五仕誰工口六矢蹋工五仕星五橋六五六轉工六五跨伬仕仕五冰丶六六工工尺輪上尺想尺工太六工乙尺工六夜五仕五六工祠尺工工尺神丶上尺工尺上尺上四一散五六華尺工六燈工原尺工與尺上工六平工五仕門六五乂六工尺工相上尺工尺近上工六尺上四况伬歌仕伬鐘仕伬列仩仜伬仕五錦六工六茵五酒六工䦨工五仕時六五尚工六自工有尺金工六鳬尺工㐅六尺工暗工尺上四合引四上尺一却六五六元尺來工月工五仕明六五無丶四上尺處六工六不尺尺上四上隨上尺工尺上上四人合四普天樂臨尺工六光工六宴五六珠尺尺上屏四上瑩尺上四傳工五柑六五六㑹工六琱工尺盤上四合進尺上四宵尺工尺烟上尺上裡四上尺蕙工五燼六工五六五蘭尺工六工尺薰尺一香上車上六度工繡五六工尺陌上尺一生工六工尺塵上尺忽六燈五仕翻六五六工一錦四上六鱗上尺工尺一近五六前尺看工是六當工年尺工尺上韓四上國上尺上四一夫尺工尺上四人合四古輪臺玉工五六五河尺工六工尺津尺工尺碧工天工六工清尺露工尺上灑工尺車五上茵五六馬尺上蹄上工六工撲尺處工霜仕伬仕花五潤五仕五六任五香工泥尺工六工尺留上尺印工尺上未上五卸工尺銀上尺工尺魚上尺何工六處仕五六金工吾尺工六工厮尺認工尺上一安尺工福尺門上尺工邊尺長上工春工六工尺殿上尺上四裡合四霓上工裳尺工六工方尺奏工第五伬仕三五六廵工六五六看五蹋上工歌工六工歸尺去工尺上傍工宫尺工尺牆上尺曲五調五仕五六五増工六工尺新尺金工鑰尺工六工尺垂上尺工來上尺珠工繩尺工六工尺轉上尺後工五銅上壺上滴尺盡工五花六五六犬工吠五伬仕狺工五六狺工六五六城上工南尺工六近工五喜尺樓上頭上紅上尺工燭尺又五伬仕迎工五六人工六尾聲華工五胥六有四夢上六應尺工難上尺訊工嘆工尺元上夜工六還上留上漢五六工苑工六春五五六工一愁尺則工六工愁尺終工夜工六工尺工堦仕伬仕伬仕五前六五看伬仕五月六五㐅六工六五人六五徐仲山薄人為詞嘗作青玉案起句云少年不幸稱才子徒多作滛詞耳予避人時讀其句憬然遂續云况復依人隨指使西園載酒東家聽伎多少周旋處固知輕薄子原自有非其意者特予少時與姜公子作當樓詞極知失温厚之意既而自觧謂國風甚温厚然朱子註作滛詩則在六經中亦儼然有此等為夫子所録因任情為之要亦無學問不能自主故有此嘗與徐仲山道及仲山曰君詞不然靈均九歌張衡四愁茍非朱註焉知國風非懷君念友之作予曰如此則小人文過過益甚矣不幸少年坎坷失於檢飭然處已皭然或者如欄外觀塲可妄引程子心中無伎以自慰抑庶幾耳曽在上海有伎席酒眀府令一事頗怪張𢎞軒命予記之今并録後康熙丁巳上海多游客馬丹谷廣文伎席有小鬟後至詢其名曰未也座客張𢎞軒以其遲來取翩何來遲之句贈名翩來命予即席為詞記之予詞曰夜堂聽伎正絳帳花垂玉鑪香細蓮炬光中兩兩舞裙拖地忽來金雀鵶鬟小算纔堪瑣兒年紀欄邊歌緩油車暗裏翻然而至便手把金樽徐遞似嫩葉裁衣幽蘭吹氣病起遲來問取小名尚未風流京兆偏憐惜道延年女弟如是珊珊可念何如竟喚翩來為字此桂枝香調也時小鬟得詞歡然謝去惜後終以病廢且性頗稚拙獨其姊名玉烟者慧甚更善行酒除入勾欄外凡飲席必來典觴且能使意之所屬曲為照顧令不苦飲如是者多月張𢎞軒嘗曰如玊烟者可稱傾城悅名士矣苐其人尤慕張南士名嘗持束綾乞予書客所贈詞口誦了了顧獨愛南士作時南士寄任眀府署不得頻見玊烟毎乞予招㑹予寓毎㑹必流戀竟日不欲去予嘗謂之曰南士長於予其窮愁失志與予同予遘難以後全無歡情亮南士此際亦未必便與予逺然且眷眷如是者汝何所知於南士而得有此曰使必得歡情而後與之知世之所以無知也時聞之者皆善其言後玊烟歸疁城南士與徐西崖各賦絶句贈行屬予為䟦臨岐復為作南浦詞詞曰申江初霽送将歸魂斷桞條青南國佳人堪念妙麗洵傾城别我蕙心如結惜臨岐攜酒對紅亭更牽衣細語萬千珍重一曲寄深情記得碧桃開處乍相逢春夜按新聲不似今朝幽怨凄切思難勝恨殺潮生南浦也催人畵檝度前汀向亭臯搔首踟蹰愁逐水雲横其云不似今朝者以是時當筵歌㑹真長亭數曲較凄然也其後予在湖舫伎席語其事客有問予觴政何似予不能記但舉其一名積分者甲三乙四預為定分至臨飲時又復請分於酒佐如甲當請分酒佐判曰自分則甲受酒如數請騐騐訖然後舉杯曰三分於是左坐唱面曰第一盃盃釂則右坐者唱底曰第三分但分合増减惟其所判浸假乙當繼請而判加之以甲分之半則乙受酒請騐後當報五分半而左唱第二盃右當唱共計八分半矣以是遞推丙五丁六展轉交錯盃參分互彼此牴牾故酒佐有八難分數不齊客多難記一眀府令下觴行斷續二糾違舉犯呼吸不待三罰煩籌賾予奪無時四苛緩概施醉醒難愜五紅裙緑髪人易扳擾六𤓰種榛核不許私記七積乆証踈爭端易起八負此八難然且從容四應操縱如意嘗見欲縱飲者輙報自分欲縱左右忽呼間報謂隔一位間報不足或呼免報即其已掛籌聽罰者猶有重分免籌之例如一十有一二十有二類使請分時故判數犯重以蠲之一日戊飲請分判易癸分戊既不記癸分而左右茫然忘所積數然又不預呼間免名目戊與左右皆失色及戊騐分時始從容審視曰本無若干分今姑准此遂舉盃受酒朗言曰若干盃後當清分矣言畢遽自釂曰共若干分其慧如此古者以宫商角徴羽變宫變徴之七聲乗十二律得八十四調後人以宫商羽角之四聲乗十二律得四十八調蓋去徴聲與二變不用焉四十八調至宋人詩餘猶分𨽻之其調不拘短長有屬黄鍾宫者有屬黄鍾商者皆不相出入非若今之譜詩餘者僅以小令中調長調分班部也其詳載樂府渾成一書近人不觧聲律動造新曲曰自度曲試問其所自度者曲𨽻何律律𨽻何聲聲𨽻何宫何調而乃􅏌然妄作有如是耶方渭仁曰四十八調亦非古律但隋唐以來相次沿革必有所受之者聲律㣲眇宜以跡求正謂此也西河詞話巻二
